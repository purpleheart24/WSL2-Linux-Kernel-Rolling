name: Mainline RC Kernel CI Build

on:
  schedule:
    # 每天 UTC 时间 00:00 运行
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      rc_version:
        description: 'Specific RC version to build (e.g., 6.8-rc5, leave empty for latest)'
        required: false
        default: ''
      build_zfs:
        description: 'Build ZFS modules'
        required: false
        default: false
        type: boolean

jobs:
  get-latest-rc:
    name: Get Latest RC Version
    runs-on: ubuntu-latest
    outputs:
      rc_version: ${{ steps.get-rc.outputs.RC_VERSION }}
      rc_tag: ${{ steps.get-rc.outputs.RC_TAG }}
    steps:
      - name: Get Latest Mainline RC Version
        id: get-rc
        run: |
          # 如果用户指定了版本，使用指定的版本
          if [ -n "${{ github.event.inputs.rc_version }}" ]; then
            RC_VERSION="${{ github.event.inputs.rc_version }}"
          else
            # 从 kernel.org 获取最新 RC 版本
            RC_VERSION=$(curl -s https://www.kernel.org/ | grep -oP 'latest/mainline/v\K[0-9]+\.[0-9]+-rc[0-9]+' | head -1)
            if [ -z "$RC_VERSION" ]; then
              # 备用方法：从 git.kernel.org 获取
              RC_VERSION=$(curl -s https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git/refs/ | grep -oP 'refs/heads/\Kv[0-9]+\.[0-9]+-rc[0-9]+' | head -1 | sed 's/^v//')
            fi
            if [ -z "$RC_VERSION" ]; then
              echo "Failed to fetch latest RC version, using fallback"
              RC_VERSION="6.8-rc5"
            fi
          fi
          
          echo "Latest RC Version: $RC_VERSION"
          echo "RC_VERSION=$RC_VERSION" >> $GITHUB_OUTPUT
          echo "RC_TAG=v$RC_VERSION" >> $GITHUB_OUTPUT

  build:
    name: ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    needs: get-latest-rc
    container:
      image: nevuly/nevuly-dev-base:build
      options: --privileged
    outputs:
      X86_IMAGE_SHA: ${{ steps.gen-sha-256.outputs.X86_IMAGE_SHA }}
      X86_ADDON_SHA: ${{ steps.gen-sha-256.outputs.X86_ADDON_SHA }}
      X86_RT_IMAGE_SHA: ${{ steps.gen-sha-256.outputs.X86_RT_IMAGE_SHA }}
      X86_RT_ADDON_SHA: ${{ steps.gen-sha-256.outputs.X86_RT_ADDON_SHA }}
      ARM64_IMAGE_SHA: ${{ steps.gen-sha-256.outputs.ARM64_IMAGE_SHA }}
      ARM64_ADDON_SHA: ${{ steps.gen-sha-256.outputs.ARM64_ADDON_SHA }}
      ARM64_RT_IMAGE_SHA: ${{ steps.gen-sha-256.outputs.ARM64_RT_IMAGE_SHA }}
      ARM64_RT_ADDON_SHA: ${{ steps.gen-sha-256.outputs.ARM64_RT_ADDON_SHA }}
    strategy:
      matrix:
        include:
          - arch: x86
            image-name: bzImage-x86_64
            os: ubuntu-24.04
          - arch: x86-rt
            image-name: bzImage-x86_64-rt
            os: ubuntu-24.04
          - arch: arm64
            image-name: Image-arm64
            os: ubuntu-24.04-arm
          - arch: arm64-rt
            image-name: Image-arm64-rt
            os: ubuntu-24.04-arm

    steps:
      - name: Trust Build Directory
        run: |
          git config --global --add safe.directory /__w/WSL2-Linux-Kernel-Rolling/WSL2-Linux-Kernel-Rolling

      - name: Checkout
        uses: actions/checkout@main
        with:
          ref: master

      - name: Download WSL2 Configuration Files
        run: |
          echo "Cloning original Nevuly repository for WSL2 configuration files..."
          git clone https://github.com/Nevuly/WSL2-Linux-Kernel-Rolling.git --depth 1 wsl2-configs
          echo "Configuration files available:"
          ls -la wsl2-configs/arch/x86/configs/config-wsl* 2>/dev/null || echo "No x86 configs found"
          ls -la wsl2-configs/arch/arm64/configs/config-wsl* 2>/dev/null || echo "No arm64 configs found"

      - name: Download Linux Mainline RC Kernel
        run: |
          RC_VERSION="${{ needs.get-latest-rc.outputs.rc_version }}"
          echo "Building Linux Mainline RC Kernel: $RC_VERSION"
          
          # 克隆官方 mainline 内核仓库
          echo "Cloning Linux Mainline RC $RC_VERSION..."
          git clone https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git --depth 1 --branch v$RC_VERSION linux-rc || {
            echo "Failed to clone from git.kernel.org, trying GitHub mirror..."
            git clone https://github.com/torvalds/linux.git --depth 1 --branch v$RC_VERSION linux-rc
          }
          
          # 复制 WSL2 配置文件到 RC 内核
          echo "Copying WSL2 configuration files..."
          if [ -f "wsl2-configs/arch/x86/configs/config-wsl-x86" ]; then
            cp wsl2-configs/arch/x86/configs/config-wsl-x86 linux-rc/arch/x86/configs/
            echo "✓ Copied config-wsl-x86"
          else
            echo "✗ config-wsl-x86 not found!"
          fi
          
          if [ -f "wsl2-configs/arch/x86/configs/config-wsl-x86-rt" ]; then
            cp wsl2-configs/arch/x86/configs/config-wsl-x86-rt linux-rc/arch/x86/configs/
            echo "✓ Copied config-wsl-x86-rt"
          else
            echo "✗ config-wsl-x86-rt not found!"
          fi
          
          if [ -f "wsl2-configs/arch/arm64/configs/config-wsl-arm64" ]; then
            cp wsl2-configs/arch/arm64/configs/config-wsl-arm64 linux-rc/arch/arm64/configs/
            echo "✓ Copied config-wsl-arm64"
          else
            echo "✗ config-wsl-arm64 not found!"
          fi
          
          if [ -f "wsl2-configs/arch/arm64/configs/config-wsl-arm64-rt" ]; then
            cp wsl2-configs/arch/arm64/configs/config-wsl-arm64-rt linux-rc/arch/arm64/configs/
            echo "✓ Copied config-wsl-arm64-rt"
          else
            echo "✗ config-wsl-arm64-rt not found!"
          fi
          
          echo "Verifying copied files:"
          ls -la linux-rc/arch/x86/configs/config-wsl* 2>/dev/null || true
          ls -la linux-rc/arch/arm64/configs/config-wsl* 2>/dev/null || true

      - name: Build WSL2 RC Kernel
        run: |
          cd linux-rc
          if [ ${{ matrix.arch }} == "x86" ]
          then
          make KCONFIG_CONFIG=arch/x86/configs/config-wsl-x86 -j$(echo `nproc` + 1 | bc)
          cp arch/x86/boot/bzImage ../${{ matrix.image-name }}
          elif [ ${{ matrix.arch }} == "x86-rt" ]
          then
          make KCONFIG_CONFIG=arch/x86/configs/config-wsl-x86-rt -j$(echo `nproc` + 1 | bc)
          cp arch/x86/boot/bzImage ../${{ matrix.image-name }}
          elif [ ${{ matrix.arch }} == "arm64" ]
          then
          make KCONFIG_CONFIG=arch/arm64/configs/config-wsl-arm64 -j$(echo `nproc` + 1 | bc)
          cp arch/arm64/boot/Image ../${{ matrix.image-name }}
          else
          make KCONFIG_CONFIG=arch/arm64/configs/config-wsl-arm64-rt -j$(echo `nproc` + 1 | bc)
          cp arch/arm64/boot/Image ../${{ matrix.image-name }}
          fi

      - name: Generate Kernel Modules
        run: |
          cd linux-rc
          RC_VERSION="${{ needs.get-latest-rc.outputs.rc_version }}"
          mkdir -p ${{ matrix.image-name }}-addon_install && make modules_install INSTALL_MOD_PATH=${{ matrix.image-name }}-addon_install
          
          # 获取实际的内核版本字符串
          KERNEL_VER=$(ls lib/modules/ | head -1)
          echo "Kernel version from build: $KERNEL_VER"
          
          # 重命名模块目录为 WSL2 RC 格式
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]
          then
            mv lib/modules/$KERNEL_VER lib/modules/$RC_VERSION-WSL2-RC+ 2>/dev/null || true
          else
            mv lib/modules/$KERNEL_VER lib/modules/$RC_VERSION-WSL2-RT-RC+ 2>/dev/null || true
          fi

      - name: Generate Kernel Headers and Documents
        run: |
          cd linux-rc
          RC_VERSION="${{ needs.get-latest-rc.outputs.rc_version }}"
          
          # 确定模块目录路径
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]
          then
          export addon_path=${{ matrix.image-name }}-addon_install/lib/modules/$RC_VERSION-WSL2-RC+/build
          MODULE_SUFFIX="$RC_VERSION-WSL2-RC+"
          else
          export addon_path=${{ matrix.image-name }}-addon_install/lib/modules/$RC_VERSION-WSL2-RT-RC+/build
          MODULE_SUFFIX="$RC_VERSION-WSL2-RT-RC+"
          fi
          
          echo "Addon path: $addon_path"
          ls -la ${{ matrix.image-name }}-addon_install/lib/modules/
          mkdir -p $addon_path
          install -Dt "$addon_path" -m644 Makefile Module.symvers System.map vmlinux
          install -Dt "$addon_path/kernel" -m644 kernel/Makefile
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "x86-rt" ]
          then
          install -Dt "$addon_path/arch/x86" -m644 arch/x86/Makefile
          else
          install -Dt "$addon_path/arch/arm64" -m644 arch/arm64/Makefile
          fi
          cp -t "$addon_path" -a scripts
          ln -srt "$addon_path" "addon_path/scripts/gdb/vmlinux-gdb.py"
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "x86-rt" ]
          then
          install -Dt "$addon_path/tools/objtool" tools/objtool/objtool
          fi
          install -Dt "$addon_path/tools/bpf/resolve_btfids" tools/bpf/resolve_btfids/resolve_btfids
          cp -t "$addon_path" -a include
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "x86-rt" ]
          then
          cp -t "$addon_path/arch/x86" -a arch/x86/include
          install -Dt "$addon_path/arch/x86/kernel" -m644 arch/x86/kernel/asm-offsets.s
          else
          cp -t "$addon_path/arch/arm64" -a arch/arm64/include
          install -Dt "$addon_path/arch/arm64/kernel" -m644 arch/arm64/kernel/asm-offsets.s
          mkdir -p "$addon_path/arch/arm"
          cp -t "$addon_path/arch/arm" -a arch/arm/include
          fi
          install -Dt "$addon_path/drivers/md" -m644 drivers/md/*.h
          install -Dt "$addon_path/net/mac80211" -m644 net/mac80211/*.h
          install -Dt "$addon_path/drivers/media/i2c" -m644 drivers/media/i2c/msp3400-driver.h
          install -Dt "$addon_path/drivers/media/usb/dvb-usb" -m644 drivers/media/usb/dvb-usb/*.h
          install -Dt "$addon_path/drivers/media/dvb-frontends" -m644 drivers/media/dvb-frontends/*.h
          install -Dt "$addon_path/drivers/media/tuners" -m644 drivers/media/tuners/*.h
          install -Dt "$addon_path/drivers/iio/common/hid-sensors" -m644 drivers/iio/common/hid-sensors/*.h
          find . -name 'Kconfig*' -exec install -Dm644 {} "$addon_path/{}" \;
          export arch
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "x86-rt" ]
          then
          for arch in "$addon_path"/arch/*/; do
            [[ $arch = */x86/ ]] && continue
            echo "Removing $(basename "$arch")"
            rm -r "$arch"
          done
          else
          for arch in "$addon_path"/arch/*/; do
            [[ $arch = */arm64/ ]] && continue
            echo "Removing $(basename "$arch")"
            rm -r "$arch"
          done
          fi
          rm -r $addon_path/Documentation
          find -L "$addon_path" -type l -printf 'Removing %P\n' -delete
          find -L "$addon_path" -type f -name '*.o' -printf 'Removing %P\n' -delete
          export file
          export STRIP_SHARED
          export STRIP_STATIC
          export STRIP_BINARIES
          while read -rd '' $file; do
            case "$(file -Sib "$file")" in
              application/x-sharedlib\;*)
                strip -v $STRIP_SHARED $file ;;
              application/x-archive\;*)
                strip -v $STRIP_STATIC $file ;;
              application/x-executable\;*)
                strip -v $STRIP_BINARIES $file ;;
              application/x-pie-executable\;*)
                strip -v $STRIP_SHARED $file ;;
            esac
          done < <(find "$addon_path" -type f -perm -u+x ! -name vmlinux -print0)
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "x86-rt" ]
          then
          strip -v $STRIP_STATIC "$addon_path/vmlinux"
          fi
          cp -r Documentation $addon_path/Documentation
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]
          then
          rm -rf ${{ matrix.image-name }}-addon_install/lib/modules/$RC_VERSION-WSL2-RC+/build/${{ matrix.image-name }}-addon_install
          else
          rm -rf ${{ matrix.image-name }}-addon_install/lib/modules/$RC_VERSION-WSL2-RT-RC+/build/${{ matrix.image-name }}-addon_install
          fi

      - name: Download ZFS
        if: ${{ github.event.inputs.build_zfs == 'true' }}
        run: |
          git clone https://github.com/openzfs/zfs.git --depth 1 zfs

      - name: Build ZFS
        if: ${{ github.event.inputs.build_zfs == 'true' }}
        run: |
          cd zfs
          ./autogen.sh
          ./configure --with-linux="$(pwd)/../linux-rc" --with-linux-obj="$(pwd)/../linux-rc"
          make -j$(echo `nproc` + 1 | bc)

      - name: Generate ZFS Kernel Module
        if: ${{ github.event.inputs.build_zfs == 'true' }}
        run: |
          RC_VERSION="${{ needs.get-latest-rc.outputs.rc_version }}"
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]
          then
          mkdir -p linux-rc/${{ matrix.image-name }}-addon_install/lib/modules/$RC_VERSION-WSL2-RC+/extra
          find zfs/module -name "*.ko" -exec cp {} linux-rc/${{ matrix.image-name }}-addon_install/lib/modules/$RC_VERSION-WSL2-RC+/extra \;
          else
          mkdir -p linux-rc/${{ matrix.image-name }}-addon_install/lib/modules/$RC_VERSION-WSL2-RT-RC+/extra
          find zfs/module -name "*.ko" -exec cp {} linux-rc/${{ matrix.image-name }}-addon_install/lib/modules/$RC_VERSION-WSL2-RT-RC+/extra \;
          fi

      - name: Generate Kernel Addon Package
        run: |
          RC_VERSION="${{ needs.get-latest-rc.outputs.rc_version }}"
          cd linux-rc
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]
          then
          MODULE_VER="$RC_VERSION-WSL2-RC+"
          else
          MODULE_VER="$RC_VERSION-WSL2-RT-RC+"
          fi
          echo "Generating VHDX for version: $MODULE_VER"
          ls -la ${{ matrix.image-name }}-addon_install/lib/modules/
          sudo ../.github/scripts/gen_modules_vhdx.sh "$PWD/${{ matrix.image-name }}-addon_install/" "$MODULE_VER" ${{ matrix.image-name }}-addon.vhdx
          mv ${{ matrix.image-name }}-addon.vhdx ../

      - name: Generate SHA-256 Checksum
        id: gen-sha-256
        run: |
          if [ ${{ matrix.arch }} == "x86" ]
          then
          read -r x86ImageSHA rest <<< "$(sha256sum ${{ matrix.image-name }})"
          read -r x86AddonSHA rest <<< "$(sha256sum ${{ matrix.image-name }}-addon.vhdx)"
          echo "X86_IMAGE_SHA=$x86ImageSHA" >> $GITHUB_OUTPUT
          echo "X86_ADDON_SHA=$x86AddonSHA" >> $GITHUB_OUTPUT
          elif [ ${{ matrix.arch }} == "x86-rt" ]
          then
          read -r x86RTImageSHA rest <<< "$(sha256sum ${{ matrix.image-name }})"
          read -r x86RTAddonSHA rest <<< "$(sha256sum ${{ matrix.image-name }}-addon.vhdx)"
          echo "X86_RT_IMAGE_SHA=$x86RTImageSHA" >> $GITHUB_OUTPUT
          echo "X86_RT_ADDON_SHA=$x86RTAddonSHA" >> $GITHUB_OUTPUT
          elif [ ${{ matrix.arch }} == "arm64" ]
          then
          read -r arm64ImageSHA rest <<< "$(sha256sum ${{ matrix.image-name }})"
          read -r arm64AddonSHA rest <<< "$(sha256sum ${{ matrix.image-name }}-addon.vhdx)"
          echo "ARM64_IMAGE_SHA=$arm64ImageSHA" >> $GITHUB_OUTPUT
          echo "ARM64_ADDON_SHA=$arm64AddonSHA" >> $GITHUB_OUTPUT
          else
          read -r arm64RTImageSHA rest <<< "$(sha256sum ${{ matrix.image-name }})"
          read -r arm64RTAddonSHA rest <<< "$(sha256sum ${{ matrix.image-name }}-addon.vhdx)"
          echo "ARM64_RT_IMAGE_SHA=$arm64RTImageSHA" >> $GITHUB_OUTPUT
          echo "ARM64_RT_ADDON_SHA=$arm64RTAddonSHA" >> $GITHUB_OUTPUT
          fi

      - name: Upload Kernel Images
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.image-name }}-rc-${{ needs.get-latest-rc.outputs.rc_version }}
          path: |
            ${{ matrix.image-name }}
            ${{ matrix.image-name }}-addon.vhdx

  release:
    name: Release RC Kernel
    runs-on: ubuntu-latest
    needs: [build, get-latest-rc]
    env:
      X86_IMAGE_SHA: ${{ needs.build.outputs.X86_IMAGE_SHA }}
      X86_ADDON_SHA: ${{ needs.build.outputs.X86_ADDON_SHA }}
      X86_RT_IMAGE_SHA: ${{ needs.build.outputs.X86_RT_IMAGE_SHA }}
      X86_RT_ADDON_SHA: ${{ needs.build.outputs.X86_RT_ADDON_SHA }}
      ARM64_IMAGE_SHA: ${{ needs.build.outputs.ARM64_IMAGE_SHA }}
      ARM64_ADDON_SHA: ${{ needs.build.outputs.ARM64_ADDON_SHA }}
      ARM64_RT_IMAGE_SHA: ${{ needs.build.outputs.ARM64_RT_IMAGE_SHA }}
      ARM64_RT_ADDON_SHA: ${{ needs.build.outputs.ARM64_RT_ADDON_SHA }}
      RC_VERSION: ${{ needs.get-latest-rc.outputs.rc_version }}

    steps:
      - uses: actions/checkout@main
      - uses: actions/download-artifact@main
        with:
          path: release_images/

      - name: Create Release
        uses: softprops/action-gh-release@master
        with:
          name: Linux Mainline RC ${{ env.RC_VERSION }} (WSL2)
          tag_name: rc-${{ env.RC_VERSION }}
          prerelease: true
          body: |
            > [!WARNING]
            > ⚠️ **This is a PRE-RELEASE kernel built from Linux Mainline RC source!**
            > 
            > - This kernel is built from the latest Linux Mainline Release Candidate
            > - It may contain bugs and instability issues
            > - NOT recommended for production use
            > - For testing and development purposes only
            >
            > ARM64 kernel has not been tested!
            >
            > If you have any issues, please leave an issue on the [issue tab](https://github.com/Nevuly/WSL2-Rolling-Kernel-Issue/issues)!

            ### **Build Information**
            - **Kernel Version**: ${{ env.RC_VERSION }}
            - **Source**: [Linux Mainline Git](https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git)
            - **Build Type**: Release Candidate (RC)

            ### **Hash Information**
            | File Name | SHA-256 Checksum |
            |:--------------:|:------:|
            | bzImage-x86_64 | ${{ env.X86_IMAGE_SHA }} |
            | bzImage-x86_64-addon.vhdx | ${{ env.X86_ADDON_SHA }} |
            | bzImage-x86_64-rt | ${{ env.X86_RT_IMAGE_SHA }} |
            | bzImage-x86_64-rt-addon.vhdx | ${{ env.X86_RT_ADDON_SHA }} |
            | Image-arm64 | ${{ env.ARM64_IMAGE_SHA }} |
            | Image-arm64-addon.vhdx | ${{ env.ARM64_ADDON_SHA }} |
            | Image-arm64-rt | ${{ env.ARM64_RT_IMAGE_SHA }} |
            | Image-arm64-rt-addon.vhdx | ${{ env.ARM64_RT_ADDON_SHA }} |

            ### **How to install this kernel in WSL2?**
             - Please see this [wiki](https://github.com/Nevuly/WSL2-Linux-Kernel-Rolling/wiki/Install-Instructions).

            **This kernel built on ArchLinux.**
          files: |
            release_images/*/*
          token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
          fail_on_unmatched_files: true
