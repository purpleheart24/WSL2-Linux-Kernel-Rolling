name: Mainline RC Kernel CI Build (Debug)

on:
  workflow_dispatch:
    inputs:
      rc_version:
        description: 'RC version to build (e.g., 7.0-rc1)'
        required: true
        default: '7.0-rc1'

jobs:
  build-x86:
    name: Build x86_64 RC Kernel
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses-dev \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            bc \
            kmod \
            cpio \
            xz-utils \
            rsync \
            qemu-utils \
            git \
            curl

      - name: Clone Microsoft WSL2 Kernel (for configs)
        run: |
          echo "Cloning Microsoft WSL2 kernel for WSL2 configs..."
          git clone https://github.com/microsoft/WSL2-Linux-Kernel.git --depth 1 --branch linux-msft-wsl-6.1.y wsl2-microsoft
          echo "Available config files:"
          ls -la wsl2-microsoft/Microsoft/ 2>/dev/null || echo "Microsoft dir not found"
          ls -la wsl2-microsoft/arch/x86/configs/config-wsl* 2>/dev/null || echo "x86 config-wsl not found"

      - name: Clone Linux Mainline RC Kernel
        run: |
          RC_VERSION="${{ github.event.inputs.rc_version }}"
          echo "Building Linux Mainline RC Kernel: $RC_VERSION"
          
          # 尝试从 GitHub 镜像克隆（更快）
          git clone https://github.com/torvalds/linux.git --depth 1 --branch v$RC_VERSION linux-rc || {
            echo "GitHub clone failed, trying git.kernel.org..."
            git clone https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git --depth 1 --branch v$RC_VERSION linux-rc
          }
          
          # 复制 WSL2 配置文件
          echo "Copying WSL2 configuration files..."
          echo "Source files:"
          ls -la wsl2-microsoft/arch/x86/configs/ | grep wsl 2>/dev/null || echo "No wsl configs found!"
          
          # 创建 Microsoft 目录结构
          mkdir -p linux-rc/Microsoft
          
          # 复制微软的 WSL2 配置文件
          if [ -f "wsl2-microsoft/arch/x86/configs/config-wsl" ]; then
            cp wsl2-microsoft/arch/x86/configs/config-wsl linux-rc/arch/x86/configs/config-wsl-x86
            echo "✓ Copied config-wsl-x86 from Microsoft"
          else
            echo "✗ Error: Microsoft config-wsl not found!"
            exit 1
          fi
          
          echo "Verifying copied files:"
          ls -la linux-rc/arch/x86/configs/config-wsl* 2>/dev/null || echo "No files copied!"
          
          echo "Available configs:"
          ls linux-rc/arch/x86/configs/config-wsl* 2>/dev/null || echo "No WSL2 configs found!"

      - name: Build Kernel
        run: |
          cd linux-rc
          make KCONFIG_CONFIG=arch/x86/configs/config-wsl-x86 -j$(nproc)
          cp arch/x86/boot/bzImage ../bzImage-x86_64
          echo "Kernel build completed!"
          ls -lh ../bzImage-x86_64

      - name: Generate Kernel Modules
        run: |
          cd linux-rc
          RC_VERSION="${{ github.event.inputs.rc_version }}"
          make modules_install INSTALL_MOD_PATH=../modules_install
          
          # 重命名模块目录
          KERNEL_VER=$(ls ../modules_install/lib/modules/ | head -1)
          echo "Original kernel version: $KERNEL_VER"
          mv ../modules_install/lib/modules/$KERNEL_VER ../modules_install/lib/modules/$RC_VERSION-WSL2-RC+
          echo "Renamed to: $RC_VERSION-WSL2-RC+"

      - name: Generate VHDX Addon Package
        run: |
          RC_VERSION="${{ github.event.inputs.rc_version }}"
          MODULE_VER="$RC_VERSION-WSL2-RC+"
          
          echo "Generating VHDX addon package..."
          echo "Module version: $MODULE_VER"
          ls -la modules_install/lib/modules/
          
          # 使用微软官方的 gen_modules_vhdx.sh 脚本
          # 如果没有脚本，使用 qemu-img 手动创建
          if [ -f ".github/scripts/gen_modules_vhdx.sh" ]; then
            echo "Using gen_modules_vhdx.sh script..."
            sudo .github/scripts/gen_modules_vhdx.sh \
              "$PWD/modules_install/" \
              "$MODULE_VER" \
              bzImage-x86_64-addon.vhdx
          else
            echo "gen_modules_vhdx.sh not found, creating VHDX manually..."
            # 创建临时挂载点
            sudo mkdir -p /mnt/vhdx_root
            sudo cp -r modules_install/* /mnt/vhdx_root/
            
            # 使用 qemu-img 创建 VHDX
            sudo qemu-img create -f vhdx bzImage-x86_64-addon.vhdx 2G
            echo "VHDX created (note: may need proper formatting)"
          fi
          
          echo "VHDX generation completed!"
          ls -lh bzImage-x86_64-addon.vhdx 2>/dev/null || echo "VHDX file not found"

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: bzImage-x86_64-rc-${{ github.event.inputs.rc_version }}
          path: bzImage-x86_64
          retention-days: 30

      - name: Upload VHDX Addon
        uses: actions/upload-artifact@v4
        with:
          name: bzImage-x86_64-addon-rc-${{ github.event.inputs.rc_version }}
          path: bzImage-x86_64-addon.vhdx
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Modules (debug)
        uses: actions/upload-artifact@v4
        with:
          name: modules-rc-${{ github.event.inputs.rc_version }}
          path: modules_install/
          retention-days: 7
